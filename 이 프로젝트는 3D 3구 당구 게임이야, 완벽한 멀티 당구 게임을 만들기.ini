이 프로젝트는 3D 3구 당구 게임이야, 완벽한 멀티 당구 게임을 만들기 위한 분석 과 개선 또는 추가 기능 등 계획 세워줘. 기능 테스트 포함이야.

핵심 분석(확인용)
  1. 3쿠션 득점 규칙이 서버 실경기에 적용되지 않았습니다.
     서버는 샷이 끝날 때마다 점수를 +1 처리합니다.
     근거: apps/game-server/src/lobby/http.ts:556, apps/game-server/src/game/score-policy.ts:62
     반면 3쿠션 판정 로직은 별도 패키지에만 존재합니다.
     근거: packages/physics-core/src/score-adapter.ts:14
  2. 문서 기술스택과 실제 구현이 다릅니다.
     문서: Next.js/Colyseus/PixiJS/Rapier 권장
     근거: docs/Tech-Stack.md:16, docs/Tech-Stack.md:35
     실제: Vite + React Three Fiber + Ammo.js + Node HTTP
     근거: apps/web/package.json:7, apps/web/package.json:18, apps/game-server/src/main.ts:1
  3. 워크스페이스 스크립트가 placeholder라 품질 게이트 신뢰도가 낮습니다.
     근거: apps/game-server/package.json:9, packages/physics-core/package.json:8, packages/shared-types/package.json:8
  4. 웹 쪽은 독립 3D 시뮬레이터 성격이 강하고, 서버 authoritative 흐름과 직접 연결된 구조가 아닙니다(현재 상태 기준).

  좋은 점

  - GDD/Physics/Input Schema 문서가 상세하고 서로 일관성은 비교적 좋습니다.
    근거: docs/GDD.md, docs/Physics-Spec.md, docs/Input-Schema.md, schemas/shot-input-v1.json

  적용 항목(필수)
  1: 시스템 통합 좌표 매핑 및 데이터 구조
  2: 파이브 앤 하프 & 하프 시스템 (공식 및 궤적)
  3: 플러스 투 시스템 및 뱅크샷 물리
  4: 바닥 마찰(Rolling Friction)
  5: 쿠션 마찰(Anisotropic Friction)
  6: 수구 가이드 라인 시스템 (Shot Guideline System)
  7: 화면 상의 점수판 및 실시간 점수 업데이트
  8: 큐 스틱 시스템 (Cue Stick System)
  9: 화면 상의 샷 파워 및 스핀 조절 UI
  10: 화면 이동 시 큐 스틱과 수구의 위치 동기화
   11: 충돌 최적화 (Collision Optimization)
   12: 네트워크 최적화 (Network Optimization)
  Three.js와 Ammo.js를 결합 도 추가해줘
  그 외 당구 시스템을 위한 최적화 필수 기능들

  바로 다음 우선순위(권장)
  1. 서버 점수처리를 “매 샷 +1”에서 “3쿠션 판정 기반”으로 교체
  2. 기술스택 문서 vs 실제 코드 중 하나로 기준 통일
  3. placeholder 테스트/린트 스크립트를 실제 실행 스크립트로 교체






진단 요약
  핵심 분석 4개는 현재 코드 기준으로 유효합니다.

  - 서버 점수는 아직 샷 종료 시 +1입니다: http.ts:556, score-policy.ts:62
  - 3쿠션 판정은 별도 어댑터에 존재합니다: score-adapter.ts:14
  - 기술스택 문서와 구현 불일치가 있습니다: Tech-Stack.md:16, apps/web/package.json:1, main.ts:1
  - 워크스페이스 일부 스크립트가 placeholder입니다: apps/game-server/package.json:9, packages/physics-core/package.json:8, packages/shared-types/package.json:8

  목표 아키텍처(권장)

  - 서버 authoritative 유지.
  - 클라이언트(Three.js + Ammo.js)는 렌더/입력/예측 전용.
  - 서버는 물리 이벤트 로그 기반으로 3쿠션 판정 -> 점수 반영 -> 턴 전환.

  필수 12항목 반영 계획 + 테스트

  1. 좌표/데이터 구조 통합: 월드좌표 단일화, DTO 버전 고정.
     테스트: 좌표 round-trip 단위테스트 + snapshot contract 테스트.
  2. 파이브앤하프/하프 시스템: 조준 보조 엔진으로 분리.
     테스트: 기준 샷셋 대비 오차 허용치 회귀테스트.
  3. 플러스투/뱅크샷 물리: 쿠션 반사/스핀 보정 통합.
     테스트: 쿠션 충돌 각도/속도 property test.
  4. 바닥 마찰(rolling): 서버 물리상수로 일원화.
     테스트: 감속 곡선 회귀(기준 로그 비교).
  5. 쿠션 마찰(이방성): 법선/접선 분리 모델 적용.
     테스트: 좌/우 스핀별 반사 편차 테스트.
  6. 수구 가이드라인: 서버 상태 기반 실시간 업데이트.
     테스트: 턴/입력잠금 시 visibility E2E.
  7. 점수판 실시간 갱신: shot_resolved와 동기화.
     테스트: 멀티클라 동시 수신 일관성 테스트.
  8. 큐 스틱 시스템: 조준/타격 애니메이션 상태기계화.
     테스트: 상태 전이 테스트(AIMING -> SHOOTING -> SETTLED).
  9. 파워/스핀 UI: 입력-스키마-서버 clamp 완전 일치.
     테스트: 경계값(최소/최대/NaN) API 테스트.
  10. 카메라 이동-큐/수구 동기화: 카메라 이벤트와 큐 transform 결합.
     테스트: 카메라 변경 시 오차 허용치 검증.
  11. 충돌 최적화: broadphase(SAP/그리드) + substep 튜닝.
     테스트: 6인 경기 CPU budget/틱 안정성 부하테스트.
  12. 네트워크 최적화: delta snapshot + 관심영역 + 압축.
     테스트: 패킷 크기/지연/재전송 내성 테스트.

  Three.js + Ammo.js 결합(추가 요청 반영)

  - 이미 웹에 존재하므로, 다음을 추가로 수행:
  - 서버 authoritative와 브리지: 입력은 서버에만 제출, 클라는 예측 후 서버 스냅샷 재조정.
  - 예측 오차 보정: hard snap 대신 time-warp 보간.
  - 물리 파라미터 공유: physics-core 상수 단일 소스화.

