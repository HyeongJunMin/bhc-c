name: runtime-smoke

on:
  pull_request:
    paths:
      - ".github/workflows/runtime-smoke.yml"
      - "scripts/ci/**"
      - "apps/game-server/**"
      - "apps/web/**"
      - "packages/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/runtime-smoke.yml"
      - "scripts/ci/**"
      - "apps/game-server/**"
      - "apps/web/**"
      - "packages/**"
  workflow_dispatch:
    inputs:
      game_server_port:
        description: "game-server port"
        required: false
        default: "9900"
      web_port:
        description: "web dev-server port"
        required: false
        default: "9901"
      summary_format:
        description: "runtime smoke summary format (list or table)"
        required: false
        default: "list"

jobs:
  runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: runtime-smoke-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        shell: bash
        run: |
          set -euo pipefail
          corepack enable

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Validate smoke scripts
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/ci/runtime_smoke_lib.sh
          test -f scripts/ci/runtime_smoke_summary.sh
          test -f scripts/ci/runtime_smoke_gate.sh
          test -f scripts/ci/test_runtime_smoke_gate.sh
          test -f scripts/ci/runtime_smoke_artifacts.txt
          bash -n scripts/ci/runtime_smoke_lib.sh
          bash -n scripts/ci/runtime_smoke_summary.sh
          bash -n scripts/ci/runtime_smoke_gate.sh
          bash -n scripts/ci/test_runtime_smoke_gate.sh
          bash scripts/ci/test_runtime_smoke_gate.sh

      - name: Runtime smoke with cleanup trap
        shell: bash
        env:
          GAME_SERVER_PORT: ${{ github.event.inputs.game_server_port || '9900' }}
          WEB_PORT_VALUE: ${{ github.event.inputs.web_port || '9901' }}
        run: |
          set -euo pipefail
          validate_port() {
            local value="$1"
            local label="$2"
            if ! echo "$value" | grep -Eq '^[0-9]+$'; then
              echo "[runtime-smoke] ${label} is not numeric: ${value}" >&2
              exit 1
            fi
            if [ "$value" -lt 1 ] || [ "$value" -gt 65535 ]; then
              echo "[runtime-smoke] ${label} is out of range (1-65535): ${value}" >&2
              exit 1
            fi
          }
          validate_port "$GAME_SERVER_PORT" "GAME_SERVER_PORT"
          validate_port "$WEB_PORT_VALUE" "WEB_PORT_VALUE"
          if [ "$GAME_SERVER_PORT" = "$WEB_PORT_VALUE" ]; then
            echo "[runtime-smoke] GAME_SERVER_PORT and WEB_PORT_VALUE must be different: ${GAME_SERVER_PORT}" >&2
            exit 1
          fi
          for bin in curl jq grep awk sed; do
            command -v "$bin" >/dev/null 2>&1 || {
              echo "[runtime-smoke] required binary not found: $bin" >&2
              exit 1
            }
          done
          GAME_SERVER_PID=""
          WEB_PID=""
          cleanup() {
            set +e
            if [ -n "$WEB_PID" ] && kill -0 "$WEB_PID" 2>/dev/null; then
              kill -TERM "$WEB_PID"
              wait "$WEB_PID" 2>/dev/null || true
            fi
            if [ -n "$GAME_SERVER_PID" ] && kill -0 "$GAME_SERVER_PID" 2>/dev/null; then
              kill -TERM "$GAME_SERVER_PID"
              wait "$GAME_SERVER_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          PORT="$GAME_SERVER_PORT" pnpm --filter @bhc/game-server run dev > game-server.log 2>&1 &
          GAME_SERVER_PID=$!
          WEB_PORT="$WEB_PORT_VALUE" API_SERVER_URL="http://127.0.0.1:$GAME_SERVER_PORT" pnpm --filter @bhc/web run dev -- --host 127.0.0.1 --port "$WEB_PORT_VALUE" > web.log 2>&1 &
          WEB_PID=$!

          wait_http_ready() {
            local url="$1"
            local retries="$2"
            for i in $(seq 1 "$retries"); do
              if curl --connect-timeout 2 --max-time 3 -fsS "$url" >/dev/null; then
                return 0
              fi
              sleep 1
            done
            return 1
          }

          capture_stream_until() {
            local pid_var_name="$1"
            local member_id="$2"
            local output_file="$3"
            local timeout_sec="$4"
            curl -sS --max-time "$timeout_sec" \
              "http://127.0.0.1:$WEB_PORT_VALUE/api/room-stream/$ROOM_ID?memberId=$member_id" > "$output_file" &
            local pid="$!"
            printf -v "$pid_var_name" '%s' "$pid"
          }

          if ! wait_http_ready "http://127.0.0.1:$GAME_SERVER_PORT/health" 40; then
            echo "[runtime-smoke] game-server did not become ready"
            tail -n 200 game-server.log || true
            tail -n 200 web.log || true
            exit 1
          fi
          if ! wait_http_ready "http://127.0.0.1:$WEB_PORT_VALUE" 40; then
            echo "[runtime-smoke] web did not become ready"
            tail -n 200 game-server.log || true
            tail -n 200 web.log || true
            exit 1
          fi
          curl --connect-timeout 2 --max-time 5 -fsS "http://127.0.0.1:$GAME_SERVER_PORT/health" | tee health.json
          curl --connect-timeout 2 --max-time 5 -fsS "http://127.0.0.1:$WEB_PORT_VALUE" >/dev/null

          curl --connect-timeout 2 --max-time 5 -fsS -X POST "http://127.0.0.1:$WEB_PORT_VALUE/api/auth/guest" \
            -H 'content-type: application/json' \
            -d '{"nickname":"ci-smoke"}' > guest.json
          test "$(jq -r '.guestId | startswith("guest-")' guest.json)" = "true"
          HOST_ID="$(jq -r '.guestId' guest.json)"

          curl --connect-timeout 2 --max-time 5 -fsS -X POST "http://127.0.0.1:$WEB_PORT_VALUE/api/auth/guest" \
            -H 'content-type: application/json' \
            -d '{"nickname":"ci-smoke-guest"}' > guest2.json
          test "$(jq -r '.guestId | startswith("guest-")' guest2.json)" = "true"
          GUEST_ID_2="$(jq -r '.guestId' guest2.json)"

          curl --connect-timeout 2 --max-time 5 -fsS -X POST "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms" \
            -H 'content-type: application/json' \
            -d '{"title":"ci-smoke-room"}' > room.json
          test -n "$(jq -r '.room.roomId // empty' room.json)"
          ROOM_ID="$(jq -r '.room.roomId' room.json)"

          curl --connect-timeout 2 --max-time 5 -fsS -X POST "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms/$ROOM_ID/join" \
            -H 'content-type: application/json' \
            -d "{\"memberId\":\"$HOST_ID\",\"displayName\":\"ci-host\"}" > join-host.json
          test "$(jq -r '.room.playerCount // 0' join-host.json)" -ge 1

          curl --connect-timeout 2 --max-time 5 -fsS -X POST "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms/$ROOM_ID/join" \
            -H 'content-type: application/json' \
            -d "{\"memberId\":\"$GUEST_ID_2\",\"displayName\":\"ci-guest\"}" > join-guest.json
          test "$(jq -r '.room.playerCount // 0' join-guest.json)" -ge 2

          curl --connect-timeout 2 --max-time 5 -fsS -X POST "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms/$ROOM_ID/start" \
            -H 'content-type: application/json' \
            -d "{\"actorMemberId\":\"$HOST_ID\"}" > start.json
          test "$(jq -r '.room.state // empty' start.json)" = "IN_GAME"

          curl --connect-timeout 2 --max-time 5 -fsS "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms/$ROOM_ID" > detail.json
          test "$(jq -r '.room.roomId // empty' detail.json)" = "$ROOM_ID"
          test "$(jq -r '.room.state // empty' detail.json)" = "IN_GAME"
          test "$(jq -r '.room.playerCount // 0' detail.json)" -ge 2
          PRE_SHOT_DEADLINE_MS="$(jq -r '.room.turnDeadlineMs // 0' detail.json)"
          jq -e --arg h "$HOST_ID" --arg g "$GUEST_ID_2" '.room.members | map(.memberId) | index($h) != null and index($g) != null' detail.json >/dev/null
          jq -e --arg h "$HOST_ID" --arg g "$GUEST_ID_2" '.room.scoreBoard[$h] != null and .room.scoreBoard[$g] != null' detail.json >/dev/null

          curl -sS --max-time 3 \
            "http://127.0.0.1:$WEB_PORT_VALUE/api/room-stream/$ROOM_ID?memberId=$HOST_ID" > stream.txt || true
          grep -q "event: room_snapshot" stream.txt

          FORBIDDEN_STATUS="$(curl --connect-timeout 2 --max-time 5 -sS -o forbidden.json -w "%{http_code}" \
            "http://127.0.0.1:$WEB_PORT_VALUE/api/room-stream/$ROOM_ID?memberId=non-member")"
          echo "$FORBIDDEN_STATUS" > forbidden.status
          test "$FORBIDDEN_STATUS" = "403"
          test "$(jq -r '.errorCode // empty' forbidden.json)" = "ROOM_STREAM_FORBIDDEN"

          capture_stream_until SHOT_STREAM_PID "$HOST_ID" "stream-shot.txt" 4
          sleep 1

          NOW_MS="$(date +%s000)"
          curl --connect-timeout 2 --max-time 5 -fsS -X POST "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms/$ROOM_ID/shot" \
            -H 'content-type: application/json' \
            -d "{
              \"actorMemberId\":\"$HOST_ID\",
              \"payload\":{
                \"schemaName\":\"shot_input\",
                \"schemaVersion\":\"1.0.0\",
                \"roomId\":\"$ROOM_ID\",
                \"matchId\":\"ci-match\",
                \"turnId\":\"ci-turn\",
                \"playerId\":\"$HOST_ID\",
                \"clientTsMs\":$NOW_MS,
                \"shotDirectionDeg\":120,
                \"cueElevationDeg\":10,
                \"dragPx\":300,
                \"impactOffsetX\":0,
                \"impactOffsetY\":0
              }
            }" > shot.json
          test "$(jq -r '.accepted // false' shot.json)" = "true"

          curl --connect-timeout 2 --max-time 5 -sS -o shot-conflict.json -w "%{http_code}" -X POST "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms/$ROOM_ID/shot" \
            -H 'content-type: application/json' \
            -d "{
              \"actorMemberId\":\"$HOST_ID\",
              \"payload\":{
                \"schemaName\":\"shot_input\",
                \"schemaVersion\":\"1.0.0\",
                \"roomId\":\"$ROOM_ID\",
                \"matchId\":\"ci-match\",
                \"turnId\":\"ci-turn-conflict\",
                \"playerId\":\"$HOST_ID\",
                \"clientTsMs\":$NOW_MS,
                \"shotDirectionDeg\":120,
                \"cueElevationDeg\":10,
                \"dragPx\":300,
                \"impactOffsetX\":0,
                \"impactOffsetY\":0
              }
            }" > shot-conflict.status
          test "$(cat shot-conflict.status)" = "409"
          test "$(jq -r '.errorCode // empty' shot-conflict.json)" = "SHOT_STATE_CONFLICT"

          curl --connect-timeout 2 --max-time 5 -sS -o shot-invalid.json -w "%{http_code}" -X POST "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms/$ROOM_ID/shot" \
            -H 'content-type: application/json' \
            -d "{
              \"actorMemberId\":\"$HOST_ID\",
              \"payload\":{
                \"schemaName\":\"shot_input\",
                \"schemaVersion\":\"1.0.0\",
                \"roomId\":\"$ROOM_ID\",
                \"matchId\":\"ci-match\",
                \"turnId\":\"ci-turn-invalid\",
                \"playerId\":\"$HOST_ID\",
                \"clientTsMs\":$NOW_MS,
                \"shotDirectionDeg\":120,
                \"cueElevationDeg\":999,
                \"dragPx\":300,
                \"impactOffsetX\":0,
                \"impactOffsetY\":0
              }
            }" > shot-invalid.status
          test "$(cat shot-invalid.status)" = "400"
          test "$(jq -r '.errorCode // empty' shot-invalid.json)" = "SHOT_INPUT_SCHEMA_INVALID"
          wait "$SHOT_STREAM_PID" || true
          SHOT_STARTED_LINE="$(grep -n "event: shot_started" stream-shot.txt | head -n1 | cut -d: -f1)"
          SHOT_RESOLVED_LINE="$(grep -n "event: shot_resolved" stream-shot.txt | head -n1 | cut -d: -f1)"
          TURN_CHANGED_LINE="$(grep -n "event: turn_changed" stream-shot.txt | head -n1 | cut -d: -f1)"
          test -n "$SHOT_STARTED_LINE"
          test -n "$SHOT_RESOLVED_LINE"
          test -n "$TURN_CHANGED_LINE"
          test "$SHOT_STARTED_LINE" -lt "$SHOT_RESOLVED_LINE"
          test "$SHOT_RESOLVED_LINE" -lt "$TURN_CHANGED_LINE"
          echo "${SHOT_STARTED_LINE},${SHOT_RESOLVED_LINE},${TURN_CHANGED_LINE}" > shot-event-order.txt
          TURN_CHANGED_DATA_LINE="$(awk '/event: turn_changed/{getline; print; exit}' stream-shot.txt)"
          test -n "$TURN_CHANGED_DATA_LINE"
          echo "$TURN_CHANGED_DATA_LINE" | sed 's/^data: //' > turn-changed.json
          TURN_CHANGED_MEMBER_ID="$(jq -r '.currentMemberId // empty' turn-changed.json)"
          TURN_CHANGED_DEADLINE_MS="$(jq -r '.turnDeadlineMs // 0' turn-changed.json)"
          test -n "$TURN_CHANGED_MEMBER_ID"
          test "$TURN_CHANGED_DEADLINE_MS" -gt 0

          curl --connect-timeout 2 --max-time 5 -fsS "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms/$ROOM_ID" > detail-after-shot.json
          DETAIL_AFTER_SHOT_MEMBER_ID="$(jq -r '.room.members[.room.currentTurnIndex].memberId // empty' detail-after-shot.json)"
          DETAIL_AFTER_SHOT_DEADLINE_MS="$(jq -r '.room.turnDeadlineMs // 0' detail-after-shot.json)"
          test -n "$DETAIL_AFTER_SHOT_MEMBER_ID"
          test "$DETAIL_AFTER_SHOT_MEMBER_ID" = "$TURN_CHANGED_MEMBER_ID"
          test "$DETAIL_AFTER_SHOT_DEADLINE_MS" = "$TURN_CHANGED_DEADLINE_MS"
          test "$DETAIL_AFTER_SHOT_DEADLINE_MS" -gt "$PRE_SHOT_DEADLINE_MS"
          echo "${PRE_SHOT_DEADLINE_MS},${DETAIL_AFTER_SHOT_DEADLINE_MS},${DETAIL_AFTER_SHOT_MEMBER_ID}" > turn-detail-sync.txt

          capture_stream_until LEAVE_STREAM_PID "$GUEST_ID_2" "stream-leave.txt" 4
          sleep 1

          curl --connect-timeout 2 --max-time 5 -fsS -X POST "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms/$ROOM_ID/leave" \
            -H 'content-type: application/json' \
            -d "{\"actorMemberId\":\"$HOST_ID\"}" > leave-host.json
          wait "$LEAVE_STREAM_PID" || true
          test "$(jq -r '.room.hostMemberId // empty' leave-host.json)" = "$GUEST_ID_2"
          test "$(jq -r '.room.playerCount // 0' leave-host.json)" -eq 1

          curl --connect-timeout 2 --max-time 5 -fsS "http://127.0.0.1:$WEB_PORT_VALUE/api/lobby/rooms/$ROOM_ID" > detail-after-leave.json
          test "$(jq -r '.room.state // empty' detail-after-leave.json)" = "FINISHED"
          test "$(jq -r '.room.winnerMemberId // empty' detail-after-leave.json)" = "$GUEST_ID_2"
          test "$(jq -r --arg h "$HOST_ID" '.room.memberGameStates[$h] // empty' detail-after-leave.json)" = "LOSE"
          test "$(jq -r --arg g "$GUEST_ID_2" '.room.memberGameStates[$g] // empty' detail-after-leave.json)" = "WIN"
          HOST_DELEGATED_LINE="$(grep -n "event: host_delegated" stream-leave.txt | head -n1 | cut -d: -f1)"
          GAME_FINISHED_LINE="$(grep -n "event: game_finished" stream-leave.txt | head -n1 | cut -d: -f1)"
          test -n "$HOST_DELEGATED_LINE"
          test -n "$GAME_FINISHED_LINE"
          test "$HOST_DELEGATED_LINE" -lt "$GAME_FINISHED_LINE"
          echo "${HOST_DELEGATED_LINE},${GAME_FINISHED_LINE}" > leave-event-order.txt

      - name: Publish smoke summary
        if: always()
        shell: bash
        env:
          GAME_SERVER_PORT: ${{ github.event.inputs.game_server_port || '9900' }}
          WEB_PORT_VALUE: ${{ github.event.inputs.web_port || '9901' }}
          SUMMARY_FORMAT: ${{ github.event.inputs.summary_format || 'list' }}
        run: |
          bash scripts/ci/runtime_smoke_summary.sh

      - name: Enforce smoke summary gates
        if: success()
        shell: bash
        run: |
          bash scripts/ci/runtime_smoke_gate.sh --strict

      - name: Load artifact path list
        if: failure()
        id: artifact_paths
        shell: bash
        run: |
          set -euo pipefail
          test -f scripts/ci/runtime_smoke_artifacts.txt
          existing_file_list="$(mktemp)"
          while IFS= read -r artifact_path || [ -n "$artifact_path" ]; do
            if [ -n "$artifact_path" ] && [ -f "$artifact_path" ]; then
              echo "$artifact_path" >> "$existing_file_list"
            fi
          done < scripts/ci/runtime_smoke_artifacts.txt
          {
            echo "artifact_paths<<EOF"
            cat "$existing_file_list"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-smoke-logs
          path: ${{ steps.artifact_paths.outputs.artifact_paths }}
          if-no-files-found: warn
